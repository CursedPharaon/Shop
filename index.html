<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Store</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
        }
        
        .header {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 20px 30px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-top: 5px;
        }
        
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px;
            max-width: 1100px;
            margin: 0 auto;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px 20px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .card:hover::before {
            opacity: 1;
        }
        
        .card .icon {
            font-size: 50px;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }
        
        .card h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }
        
        .card .price {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 12px 0;
            position: relative;
            z-index: 1;
        }
        
        .card button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            z-index: 1;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-buy {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-buy:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .popup {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }
        
        .popup.show {
            display: flex;
        }
        
        .popup-box {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 30px 25px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .popup-box h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .popup-box input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border 0.2s;
        }
        
        .popup-box input:focus {
            border-color: #667eea;
        }
        
        .popup-box input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        .popup-box button {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }
        
        .btn-green {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
        }
        
        .btn-green:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(0, 184, 148, 0.4);
        }
        
        .btn-red {
            background: rgba(255,255,255,0.1);
            color: #ff6b6b;
        }
        
        .btn-blue {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .result-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }
        
        .result-text {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            margin: 10px 0 15px 0;
            line-height: 1.5;
        }
        
        .footer {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.3);
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>✨ Digital Store</h1>
    <p>Дизайн и разработка</p>
</div>

<div class="products" id="products"></div>

<div class="footer">© Digital Store • Все права защищены</div>

<!-- Форма заказа -->
<div class="popup" id="formPopup">
    <div class="popup-box">
        <div class="icon" id="formIcon" style="font-size:40px;"></div>
        <h2 id="formTitle"></h2>
        <p id="formPrice" style="color:#667eea;font-weight:700;margin-bottom:15px;"></p>
        <input type="text" id="custName" placeholder="👤 Ваше имя">
        <input type="text" id="custContact" placeholder="@telegram или ссылка VK">
        <button class="btn-green" id="submitBtn">✅ Оформить заказ</button>
        <button class="btn-red" onclick="hideForm()">Отмена</button>
    </div>
</div>

<!-- Результат -->
<div class="popup" id="resultPopup">
    <div class="popup-box">
        <div class="result-icon" id="resultIcon"></div>
        <p class="result-text" id="resultText"></p>
        <button class="btn-blue" onclick="hideResult()">OK</button>
    </div>
</div>

<script>
var URL = 'https://fetnrmzltbpgatcgelca.supabase.co';
var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZldG5ybXpsdGJwZ2F0Y2dlbGNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNzU5NjQsImV4cCI6MjA5NTY1MTk2NH0.l-3iGMBY1mRnpGxNjZN981i360k4fgYsgyEkwBK1jqU';

var products = [
    { id:1, name:'2D Логотип', price:230, icon:'🎨', color:'#ff6b6b' },
    { id:2, name:'Сайт под ключ', price:350, icon:'💻', color:'#667eea' },
    { id:3, name:'ВК Бот с нуля', price:300, icon:'🤖', color:'#4ecdc4' },
    { id:4, name:'ТГ Бот с нуля', price:250, icon:'✈️', color:'#45b7d1' },
    { id:5, name:'3D Логотип', price:260, icon:'💎', color:'#f093fb' },
    { id:6, name:'2D Обложка', price:250, icon:'🖼️', color:'#ffa502' },
    { id:7, name:'3D Обложка', price:280, icon:'🌟', color:'#7bed9f' }
];

var cur = null;

document.getElementById('products').innerHTML = products.map(function(p) {
    return '<div class="card">' +
        '<div class="icon">' + p.icon + '</div>' +
        '<h3>' + p.name + '</h3>' +
        '<div class="price">от ' + p.price + ' ₽</div>' +
        '<button class="btn-buy" onclick="buy(' + p.id + ')">Заказать</button>' +
    '</div>';
}).join('');

function buy(id) {
    cur = products.find(function(p) { return p.id === id; });
    document.getElementById('formIcon').textContent = cur.icon;
    document.getElementById('formTitle').textContent = cur.name;
    document.getElementById('formPrice').textContent = 'Цена: от ' + cur.price + ' ₽';
    document.getElementById('custName').value = '';
    document.getElementById('custContact').value = '';
    document.getElementById('formPopup').classList.add('show');
}

function hideForm() { document.getElementById('formPopup').classList.remove('show'); }
function showResult(icon, text) {
    document.getElementById('resultIcon').textContent = icon;
    document.getElementById('resultText').textContent = text;
    document.getElementById('resultPopup').classList.add('show');
}
function hideResult() { document.getElementById('resultPopup').classList.remove('show'); }

document.getElementById('submitBtn').onclick = async function() {
    var name = document.getElementById('custName').value.trim();
    var contact = document.getElementById('custContact').value.trim();
    
    if (!name || !contact) { showResult('❌', 'Заполни все поля!'); return; }
    
    hideForm();
    showResult('✅', 'Заказ оформлен!\nЯ скоро свяжусь с вами\nдля уточнения деталей.');
    
    // Telegram
    try {
        var s = await fetch(URL + '/rest/v1/settings?select=*', { headers: {'apikey': KEY} });
        var set = await s.json();
        if (set.length > 0) {
            await fetch('https://api.telegram.org/bot' + set[0].bot_token + '/sendMessage', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: set[0].chat_id,
                    text: '🛒 *НОВЫЙ ЗАКАЗ!*\n\n' +
                          cur.icon + ' *' + cur.name + '*\n' +
                          '💰 Цена: от *' + cur.price + ' ₽*\n\n' +
                          '👤 Имя: ' + name + '\n' +
                          '📱 Контакт: ' + contact,
                    parse_mode: 'Markdown'
                })
            });
        }
    } catch(e) {}
    
    // Сохраняем
    try {
        await fetch(URL + '/rest/v1/orders', {
            method: 'POST',
            headers: { 'apikey': KEY, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                customer_name: name,
                customer_phone: contact,
                items: JSON.stringify([{name:cur.name, price:cur.price, qty:1}]),
                total: cur.price
            })
        });
    } catch(e) {}
};
</script>
</body>
</html>
