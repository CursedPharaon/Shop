<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Магазин</title>
    <style>
        body { font-family: Arial; background: #f5f5f5; margin: 0; }
        .header { background: #1a1a2e; color: white; padding: 15px 30px; }
        .products { display: flex; flex-wrap: wrap; gap: 15px; padding: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; border-radius: 10px; padding: 15px; width: 220px; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
        .card h3 { margin: 8px 0; font-size: 16px; }
        .card .price { font-size: 18px; font-weight: bold; color: #e94560; }
        .card button { width: 100%; padding: 10px; margin-top: 5px; background: #0f3460; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>Магазин</h1>
</div>

<div class="products" id="products"></div>

<script>
const URL = 'https://fetnrmzltbpgatcgelca.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZldG5ybXpsdGJwZ2F0Y2dlbGNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNzU5NjQsImV4cCI6MjA5NTY1MTk2NH0.l-3iGMBY1mRnpGxNjZN981i360k4fgYsgyEkwBK1jqU';

const products = [
    { id:1, name:'iPhone 15', price:89990, image:'https://picsum.photos/300/300?1', desc:'128GB' },
    { id:2, name:'Samsung S24', price:79990, image:'https://picsum.photos/300/300?2', desc:'256GB' },
    { id:3, name:'AirPods Pro', price:19990, image:'https://picsum.photos/300/300?3', desc:'2 gen' },
    { id:4, name:'MacBook Air', price:109990, image:'https://picsum.photos/300/300?4', desc:'M3' }
];

document.getElementById('products').innerHTML = products.map(p => `
    <div class="card">
        <img src="${p.image}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <div class="price">${p.price.toLocaleString()} ₽</div>
        <button onclick="buy(${p.id})">Купить</button>
    </div>
`).join('');

async function buy(id) {
    const name = prompt('Ваше имя:');
    if (!name) return;
    const contact = prompt('Telegram или VK (@username):');
    if (!contact) return;
    
    const p = products.find(x => x.id === id);
    
    const order = {
        customer_name: name,
        customer_phone: contact,
        items: JSON.stringify([{name:p.name, price:p.price, qty:1}]),
        total: p.price
    };
    
    const res = await fetch(URL + '/rest/v1/orders', {
        method: 'POST',
        headers: { 'apikey': KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify(order)
    });
    
    if (res.ok) {
        // Отправка в Telegram
        try {
            const s = await fetch(URL + '/rest/v1/settings?select=*', { headers: {'apikey': KEY} });
            const settings = await s.json();
            if (settings.length > 0) {
                const {bot_token, chat_id} = settings[0];
                await fetch(`https://api.telegram.org/bot${bot_token}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: chat_id,
                        text: `🛒 Заказ!\n👤 ${name}\n📱 ${contact}\n📦 ${p.name}\n💰 ${p.price} ₽`
                    })
                });
            }
        } catch(e) {}
        alert('✅ Заказ оформлен!');
    } else {
        const err = await res.text();
        alert('Ошибка: ' + err);
    }
}
</script>

</body>
</html>
